name: Publish to npm

on:
  release:
    types: [published]
  # Allow manual dispatch in case a release is created with the wrong
  # tag and needs a second attempt.
  workflow_dispatch: {}

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify package.json version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF#refs/tags/}
          TAG_STRIPPED=${TAG#v}
          if [ "$PKG_VERSION" != "$TAG_STRIPPED" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_STRIPPED)"
            exit 1
          fi
      # NOTE: --provenance requires the source repo to be PUBLIC (npm's
      # transparency log can't reference private commits). validpay-node-sdk
      # is currently private — drop the flag. If we later open-source the
      # SDK, re-add `--provenance` and the `id-token: write` permission
      # above.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
